name: oncosoul
description: A new Flutter project.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  permission_handler: ^11.3.0

  cupertino_icons: ^1.0.2
  url_launcher: ^6.2.5
  pdf: ^3.10.4
  printing: ^5.12.0
  path_provider: ^2.1.2
  file_picker: ^10.3.10
  open_filex: ^4.3.4
  firebase_core: ^3.15.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.0
  image_picker: ^1.0.7
  intl: ^0.19.0
  http: ^1.2.0
  firebase_storage: ^12.4.0
  webview_flutter: ^4.10.0
  webview_flutter_web: ^0.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/images/dashboard_bg.jpg"
    background_color: "#ffffff"  # for PWA
    theme_color: "#ffffff"
  image_path: "assets/images/dashboard_bg.jpg"

flutter:
  uses-material-design: true

  assets:
    - assets/images/dashboard_bg.jpg